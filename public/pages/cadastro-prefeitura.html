<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Prefeitura – STE</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../styles/main.css">
</head>
<body>
<div id="sidebar"></div>
<div class="sidebar-overlay" id="sidebar-overlay"></div>
<div id="main-content">
  <header class="topbar">
    <div class="d-flex align-items-center gap-3">
      <button id="sidebar-toggle" class="btn-icon" style="background:transparent;color:var(--ste-text);">
        <i class="bi bi-list" style="font-size:22px"></i>
      </button>
      <span class="topbar-title">Cadastro de Prefeitura</span>
    </div>
    <div class="topbar-right">
      <div class="topbar-user">
        <div class="topbar-avatar" id="topbar-avatar-letter">U</div>
        <span id="topbar-username">Usuário</span>
      </div>
    </div>
  </header>
  <main class="page-content">
    <div class="page-header">
      <div>
        <h1>Nova Prefeitura</h1>
        <p class="page-subtitle">Cadastre uma prefeitura autorizadora no sistema</p>
      </div>
      <a href="listagem-prefeitura.html" class="btn-ste-secondary">
        <i class="bi bi-arrow-left"></i> Ver listagem
      </a>
    </div>
    <div id="alert-area"></div>
    <form id="formPrefeitura" novalidate>
      <div class="ste-card">
        <div class="ste-card-header">
          <div class="card-icon"><i class="bi bi-building-fill"></i></div>
          <h2>Dados da Prefeitura</h2>
        </div>
        <div class="row g-3">
          <div class="col-md-7">
            <label for="razaoSocial" class="form-label">Razão Social <span class="text-danger">*</span></label>
            <input type="text" id="razaoSocial" class="form-control" placeholder="Nome oficial da prefeitura" required>
            <div class="invalid-feedback">Informe a razão social.</div>
          </div>
          <div class="col-md-5">
            <label for="cnpj" class="form-label">CNPJ <span class="text-danger">*</span></label>
            <input type="text" id="cnpj" class="form-control" placeholder="00.000.000/0000-00" required maxlength="18">
            <div class="invalid-feedback">Informe o CNPJ.</div>
          </div>
          <div class="col-md-8">
            <label for="endereco" class="form-label">Endereço <span class="text-danger">*</span></label>
            <input type="text" id="endereco" class="form-control" placeholder="Rua, número, bairro" required>
            <div class="invalid-feedback">Informe o endereço.</div>
          </div>
          <div class="col-md-4">
            <label for="telefones" class="form-label">Telefone(s) <span class="text-danger">*</span></label>
            <input type="text" id="telefones" class="form-control" placeholder="(28) 3322-0000" required>
            <div class="invalid-feedback">Informe o telefone.</div>
          </div>
          <div class="col-md-5">
            <label for="email" class="form-label">E-mail <span class="text-danger">*</span></label>
            <input type="email" id="email" class="form-control" placeholder="contato@prefeitura.gov.br" required>
            <div class="invalid-feedback">Informe um e-mail válido.</div>
          </div>
          <div class="col-md-4">
            <label for="cidadeId" class="form-label">Cidade <span class="text-danger">*</span></label>
            <select id="cidadeId" class="form-select" required>
              <option value="">-- Carregando... --</option>
            </select>
            <div class="invalid-feedback">Selecione a cidade.</div>
          </div>
        </div>
      </div>
      <div class="d-flex gap-3 justify-content-end">
        <a href="listagem-prefeitura.html" class="btn-ste-secondary"><i class="bi bi-x"></i> Cancelar</a>
        <button type="submit" class="btn-ste-primary" id="btnSalvar">
          <i class="bi bi-check-lg"></i> Salvar Prefeitura
        </button>
      </div>
    </form>
  </main>
</div>
<div id="toast-container"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
  import { injectSidebar } from '../assets/js/sidebar.js';
  import { showToast, populateSelect } from '../assets/js/ui.js';
  import { api } from '../assets/js/api.js';
  if (!localStorage.getItem('ste-user')) window.location.href = 'login.html';

  document.addEventListener('DOMContentLoaded', async () => {
    injectSidebar();
    try {
      const cidades = await api.get('/cidades?include=true');
      populateSelect('cidadeId', cidades, 'codigo', c => `${c.nome} – ${c.estado?.sigla ?? ''}`, 'Selecione a cidade');
    } catch(e) { showToast('Erro ao carregar cidades.', 'error'); }

    // CNPJ mask
    const cnpjEl = document.getElementById('cnpj');
    cnpjEl.addEventListener('input', () => {
      let v = cnpjEl.value.replace(/\D/g,'').slice(0,14);
      v = v.replace(/^(\d{2})(\d)/,'$1.$2');
      v = v.replace(/^(\d{2})\.(\d{3})(\d)/,'$1.$2.$3');
      v = v.replace(/\.(\d{3})(\d)/,'.$1/$2');
      v = v.replace(/(\d{4})(\d)/,'$1-$2');
      cnpjEl.value = v;
    });

    document.getElementById('formPrefeitura').addEventListener('submit', async e => {
      e.preventDefault();
      const form = e.target;
      form.classList.add('was-validated');
      if (!form.checkValidity()) return;
      const btn = document.getElementById('btnSalvar');
      btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Salvando...';
      try {
        await api.post('/prefeituras', {
          razaoSocial: document.getElementById('razaoSocial').value.trim(),
          cnpj: document.getElementById('cnpj').value.trim(),
          endereco: document.getElementById('endereco').value.trim(),
          telefones: document.getElementById('telefones').value.trim(),
          email: document.getElementById('email').value.trim(),
          cidadeId: parseInt(document.getElementById('cidadeId').value),
        });
        showToast('Prefeitura cadastrada com sucesso!', 'success');
        form.reset(); form.classList.remove('was-validated');
      } catch(e) {
        document.getElementById('alert-area').innerHTML =
          `<div class="alert alert-danger alert-dismissible d-flex align-items-center gap-2 mb-3 fade show">
            <i class="bi bi-exclamation-triangle-fill"></i><span>${e.message}</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>`;
      } finally {
        btn.disabled = false; btn.innerHTML = '<i class="bi bi-check-lg"></i> Salvar Prefeitura';
      }
    });
  });
</script>
</body>
</html>
