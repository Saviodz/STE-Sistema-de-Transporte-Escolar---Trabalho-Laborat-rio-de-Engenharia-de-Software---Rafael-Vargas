<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sair – STE</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../styles/main.css">
</head>
<body>
<div id="sidebar"></div>
<div class="sidebar-overlay" id="sidebar-overlay"></div>
<div id="main-content">
  <header class="topbar">
    <div class="d-flex align-items-center gap-3">
      <button id="sidebar-toggle" class="btn-icon" style="background:transparent;color:var(--ste-text);">
        <i class="bi bi-list" style="font-size:22px"></i>
      </button>
      <span class="topbar-title">Sair do Sistema</span>
    </div>
    <div class="topbar-right">
      <div class="topbar-user">
        <div class="topbar-avatar" id="topbar-avatar-letter">U</div>
        <span id="topbar-username">Usuário</span>
      </div>
    </div>
  </header>
  <main class="page-content d-flex align-items-center justify-content-center" style="min-height:calc(100vh - 62px)">
    <div class="text-center" style="max-width:420px">
      <div style="width:80px;height:80px;border-radius:20px;background:rgba(231,76,60,.1);
                  display:inline-flex;align-items:center;justify-content:center;margin-bottom:24px;">
        <i class="bi bi-box-arrow-left" style="font-size:36px;color:var(--ste-danger)"></i>
      </div>
      <h1 style="font-size:22px;font-weight:700;color:var(--ste-text);margin-bottom:8px;">Deseja sair?</h1>
      <p style="color:var(--ste-text-muted);font-size:14px;margin-bottom:32px;">
        Você está prestes a encerrar sua sessão no STE. Certifique-se de ter salvo todas as alterações antes de prosseguir.
      </p>
      <div class="d-flex gap-3 justify-content-center">
        <a href="index.html" class="btn-ste-secondary" style="padding:11px 28px;">
          <i class="bi bi-arrow-left"></i> Voltar
        </a>
        <button id="btnSair" class="btn-ste-primary" style="padding:11px 28px;background:var(--ste-danger);">
          <i class="bi bi-box-arrow-left"></i> Confirmar Saída
        </button>
      </div>
    </div>
  </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
  import { injectSidebar } from '../assets/js/sidebar.js';
  if (!localStorage.getItem('ste-user')) window.location.href = 'login.html';
  document.addEventListener('DOMContentLoaded', () => {
    injectSidebar();
    document.getElementById('btnSair').addEventListener('click', () => {
      localStorage.removeItem('ste-user');
      window.location.href = '../index.html';
    });
  });
</script>
</body>
</html>
