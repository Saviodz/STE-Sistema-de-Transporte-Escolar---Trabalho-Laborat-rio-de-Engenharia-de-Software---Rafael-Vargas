<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrar Viagem – STE</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../styles/main.css">
</head>
<body>
<div id="sidebar"></div>
<div class="sidebar-overlay" id="sidebar-overlay"></div>
<div id="main-content">
  <header class="topbar">
    <div class="d-flex align-items-center gap-3">
      <button id="sidebar-toggle" class="btn-icon" style="background:transparent;color:var(--ste-text);">
        <i class="bi bi-list" style="font-size:22px"></i>
      </button>
      <span class="topbar-title">Registrar Viagem</span>
    </div>
    <div class="topbar-right">
      <div class="topbar-user">
        <div class="topbar-avatar" id="topbar-avatar-letter">U</div>
        <span id="topbar-username">Usuário</span>
      </div>
    </div>
  </header>
  <main class="page-content">
    <div class="page-header">
      <div><h1>Nova Viagem</h1><p class="page-subtitle">Registre a execução de uma rota de transporte escolar</p></div>
      <a href="listagem-viagens.html" class="btn-ste-secondary">
        <i class="bi bi-arrow-left"></i> Ver listagem
      </a>
    </div>
    <div id="alert-area"></div>
    <form id="formViagem" novalidate>
      <div class="ste-card">
        <div class="ste-card-header">
          <div class="card-icon"><i class="bi bi-calendar2-check-fill"></i></div>
          <h2>Dados da Viagem</h2>
        </div>
        <div class="row g-3">
          <div class="col-md-3">
            <label for="data" class="form-label">Data da Viagem <span class="text-danger">*</span></label>
            <input type="date" id="data" class="form-control" required>
            <div class="invalid-feedback">Informe a data.</div>
          </div>
          <div class="col-md-2">
            <label for="horarioSaida" class="form-label">Horário de Saída <span class="text-danger">*</span></label>
            <input type="time" id="horarioSaida" class="form-control" required>
            <div class="invalid-feedback">Informe o horário de saída.</div>
          </div>
          <div class="col-md-2">
            <label for="horarioChegada" class="form-label">Horário de Chegada <span class="text-danger">*</span></label>
            <input type="time" id="horarioChegada" class="form-control" required>
            <div class="invalid-feedback">Informe o horário de chegada.</div>
          </div>
        </div>
      </div>

      <div class="ste-card">
        <div class="ste-card-header">
          <div class="card-icon"><i class="bi bi-link-45deg"></i></div>
          <h2>Recursos da Viagem</h2>
        </div>
        <div class="row g-3">
          <div class="col-md-5">
            <label for="rotaId" class="form-label">Rota <span class="text-danger">*</span></label>
            <select id="rotaId" class="form-select" required>
              <option value="">-- Carregando... --</option>
            </select>
            <div class="invalid-feedback">Selecione a rota.</div>
          </div>
          <!-- Rota preview -->
          <div class="col-md-7" id="rotaPreview" style="display:none">
            <div class="p-3 rounded-3" style="background:rgba(30,144,255,.06); border:1px solid rgba(30,144,255,.18)">
              <div class="d-flex align-items-center gap-2 fs-13">
                <i class="bi bi-signpost-2-fill text-accent"></i>
                <span id="rotaDetalhe" class="fw-600"></span>
              </div>
              <div class="text-muted fs-13 mt-1" id="rotaTurno"></div>
            </div>
          </div>
          <div class="col-md-5">
            <label for="motoristaId" class="form-label">Motorista <span class="text-danger">*</span></label>
            <select id="motoristaId" class="form-select" required>
              <option value="">-- Carregando... --</option>
            </select>
            <div class="invalid-feedback">Selecione o motorista.</div>
          </div>
          <div class="col-md-4">
            <label for="onibusId" class="form-label">Ônibus <span class="text-danger">*</span></label>
            <select id="onibusId" class="form-select" required>
              <option value="">-- Carregando... --</option>
            </select>
            <div class="invalid-feedback">Selecione o ônibus.</div>
          </div>
        </div>
      </div>

      <div class="d-flex gap-3 justify-content-end">
        <a href="listagem-viagens.html" class="btn-ste-secondary"><i class="bi bi-x"></i> Cancelar</a>
        <button type="submit" class="btn-ste-primary" id="btnSalvar">
          <i class="bi bi-check-lg"></i> Registrar Viagem
        </button>
      </div>
    </form>
  </main>
</div>
<div id="toast-container"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
  import { injectSidebar } from '../assets/js/sidebar.js';
  import { showToast, populateSelect } from '../assets/js/ui.js';
  import { api } from '../assets/js/api.js';
  if (!localStorage.getItem('ste-user')) window.location.href = 'login.html';

  let rotasData = [];

  document.addEventListener('DOMContentLoaded', async () => {
    injectSidebar();
    // Default date = today
    document.getElementById('data').value = new Date().toISOString().split('T')[0];

    try {
      const [rotas, motoristas, onibus] = await Promise.all([
        api.get('/rotas?include=true'),
        api.get('/motoristas'),
        api.get('/onibus'),
      ]);
      rotasData = rotas;
      populateSelect('rotaId', rotas, 'codigo',
        r => `#${r.codigo} | ${r.origem?.nome ?? r.origemId} → ${r.destino?.nome ?? r.destinoId} (${r.turno})`,
        'Selecione a rota');
      populateSelect('motoristaId',
        motoristas.filter(m => m.situacao === 'ATIVO'),
        'codigo', m => `${m.nome} – CNH ${m.cnh}`, 'Selecione o motorista');
      populateSelect('onibusId',
        onibus.filter(o => o.situacao === 'ATIVO'),
        'codigo', o => `${o.placa} – ${o.modelo} (${o.capacidade} lugares)`, 'Selecione o ônibus');
    } catch(e) { showToast('Erro ao carregar dados: ' + e.message, 'error'); }

    // Rota preview
    document.getElementById('rotaId').addEventListener('change', e => {
      const id = parseInt(e.target.value);
      const rota = rotasData.find(r => r.codigo === id);
      const preview = document.getElementById('rotaPreview');
      if (rota) {
        document.getElementById('rotaDetalhe').textContent =
          `${rota.origem?.nome ?? '?'} → ${rota.destino?.nome ?? '?'}`;
        document.getElementById('rotaTurno').textContent =
          `Turno: ${rota.turno} | ${rota.descricao}`;
        preview.style.display = 'block';
      } else {
        preview.style.display = 'none';
      }
    });

    document.getElementById('formViagem').addEventListener('submit', async e => {
      e.preventDefault();
      const form = e.target;
      form.classList.add('was-validated');
      if (!form.checkValidity()) return;
      const btn = document.getElementById('btnSalvar');
      btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Registrando...';
      try {
        await api.post('/viagens', {
          data:           document.getElementById('data').value,
          horarioSaida:   document.getElementById('horarioSaida').value,
          horarioChegada: document.getElementById('horarioChegada').value,
          rotaId:         parseInt(document.getElementById('rotaId').value),
          motoristaId:    parseInt(document.getElementById('motoristaId').value),
          onibusId:       parseInt(document.getElementById('onibusId').value),
        });
        showToast('Viagem registrada com sucesso!', 'success');
        form.reset(); form.classList.remove('was-validated');
        document.getElementById('rotaPreview').style.display = 'none';
        document.getElementById('data').value = new Date().toISOString().split('T')[0];
      } catch(e) {
        document.getElementById('alert-area').innerHTML =
          `<div class="alert alert-danger alert-dismissible d-flex gap-2 align-items-center mb-3 fade show">
            <i class="bi bi-exclamation-triangle-fill"></i><span>${e.message}</span>
            <button class="btn-close" data-bs-dismiss="alert"></button></div>`;
      } finally {
        btn.disabled = false; btn.innerHTML = '<i class="bi bi-check-lg"></i> Registrar Viagem';
      }
    });
  });
</script>
</body>
</html>
