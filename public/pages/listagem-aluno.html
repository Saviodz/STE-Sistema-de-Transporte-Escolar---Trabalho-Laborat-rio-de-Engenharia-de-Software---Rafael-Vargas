<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Listagem de Alunos – STE</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../styles/main.css">
</head>
<body>

<div id="sidebar"></div>
<div class="sidebar-overlay" id="sidebar-overlay"></div>

<div id="main-content">
  <header class="topbar">
    <div class="d-flex align-items-center gap-3">
      <button id="sidebar-toggle" class="btn-icon" style="background:transparent;color:var(--ste-text);">
        <i class="bi bi-list" style="font-size:22px"></i>
      </button>
      <span class="topbar-title">Alunos</span>
    </div>
    <div class="topbar-right">
      <div class="topbar-user">
        <div class="topbar-avatar" id="topbar-avatar-letter">U</div>
        <span id="topbar-username">Usuário</span>
      </div>
    </div>
  </header>

  <main class="page-content">
    <div class="page-header">
      <div>
        <h1>Alunos Cadastrados</h1>
        <p class="page-subtitle">Gerencie os alunos registrados no sistema</p>
      </div>
      <a href="cadastro-aluno.html" class="btn-ste-primary">
        <i class="bi bi-plus-lg"></i> Novo Aluno
      </a>
    </div>

    <div class="ste-card">
      <!-- Toolbar -->
      <div class="d-flex align-items-center justify-content-between mb-3 flex-wrap gap-2">
        <div class="search-bar">
          <i class="bi bi-search search-icon"></i>
          <input type="text" id="searchInput" class="form-control" placeholder="Buscar por nome ou CPF…">
        </div>
        <span class="fs-13 text-muted" id="countLabel">Carregando…</span>
      </div>

      <!-- Table -->
      <div class="table-wrapper">
        <table class="ste-table" id="tabelaAlunos">
          <thead>
            <tr>
              <th>#</th>
              <th>Nome</th>
              <th>CPF</th>
              <th>Instituição</th>
              <th>Prefeitura</th>
              <th>Rota(s)</th>
              <th>Situação</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="tbodyAlunos">
            <tr><td colspan="8" class="text-center py-4 text-muted"><div class="spinner-border spinner-border-sm me-2"></div>Carregando…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>


<div id="toast-container"></div>
<div id="confirm-placeholder"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
  import { injectSidebar } from '../assets/js/sidebar.js';
  import { showToast, populateSelect, badgeSituacao, confirmDelete, fmtDate } from '../assets/js/ui.js';
  import { api } from '../assets/js/api.js';

  if (!localStorage.getItem('ste-user')) window.location.href = 'login.html';

  let allAlunos = [];

  document.addEventListener('DOMContentLoaded', async () => {
    injectSidebar();
    await loadAll();

    document.getElementById('searchInput').addEventListener('input', e => {
      const q = e.target.value.toLowerCase();
      renderTable(allAlunos.filter(a =>
        a.nome?.toLowerCase().includes(q) || a.cpf?.includes(q)
      ));
    });
  });

  async function loadAll() {
    try {
      allAlunos = await api.get('/alunos?include=true');
      renderTable(allAlunos);
    } catch (e) {
      showToast('Erro ao carregar alunos: ' + e.message, 'error');
    }
  }

  function renderTable(list) {
    const tbody = document.getElementById('tbodyAlunos');
    document.getElementById('countLabel').textContent = `${list.length} registro(s)`;

    if (!list.length) {
      tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state"><i class="bi bi-people"></i><p>Nenhum aluno encontrado.</p></div></td></tr>`;
      return;
    }

    tbody.innerHTML = list.map(a => `
      <tr>
        <td class="fw-600 text-accent">${a.codigo}</td>
        <td class="fw-600">${a.nome}</td>
        <td style="font-family:monospace">${a.cpf}</td>
        <td>${a.instituicaoEnsino?.nome ?? a.instituicaoEnsinoId ?? '—'}</td>
        <td>${a.prefeitura?.razaoSocial ?? a.prefeituraId ?? '—'}</td>
        <td>${a.matriculas && a.matriculas.length > 0 ? a.matriculas.map(m => `<span class="badge bg-secondary mb-1">${m.rota?.descricao || 'Rota '+m.rotaId}</span>`).join(' ') : '<span class="text-muted small">Sem Rota</span>'}</td>
        <td>${badgeSituacao(a.situacaoAcesso)}</td>
        <td>
          <div class="action-btns">
            <button class="btn-icon edit" title="Editar" onclick="openEdit(${a.codigo})"><i class="bi bi-pencil-fill"></i></button>
            <button class="btn-icon delete" title="Excluir" onclick="deleteAluno(${a.codigo}, '${a.nome.replace(/'/g, "\\'")}')"><i class="bi bi-trash-fill"></i></button>
          </div>
        </td>
      </tr>`).join('');
  }

  window.openEdit = (id) => {
      window.location.href = `cadastro-aluno.html?id=${id}`;
  };

  window.deleteAluno = (id, nome) => {
    confirmDelete(`Deseja excluir o aluno "${nome}"? Esta ação não pode ser desfeita.`, async () => {
      try {
        await api.delete(`/alunos/${id}`);
        showToast('Aluno excluído com sucesso!', 'success');
        allAlunos = allAlunos.filter(a => a.codigo !== id);
        renderTable(allAlunos);
      } catch (e) {
        showToast('Erro ao excluir: ' + e.message, 'error');
      }
    });
  };
</script>
</body>
</html>
