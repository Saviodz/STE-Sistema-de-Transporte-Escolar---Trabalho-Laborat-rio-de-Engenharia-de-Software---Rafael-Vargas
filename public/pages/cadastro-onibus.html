<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Ônibus – STE</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../styles/main.css">
</head>
<body>
<div id="sidebar"></div>
<div class="sidebar-overlay" id="sidebar-overlay"></div>
<div id="main-content">
  <header class="topbar">
    <div class="d-flex align-items-center gap-3">
      <button id="sidebar-toggle" class="btn-icon" style="background:transparent;color:var(--ste-text);">
        <i class="bi bi-list" style="font-size:22px"></i>
      </button>
      <span class="topbar-title">Cadastro de Ônibus</span>
    </div>
    <div class="topbar-right">
      <div class="topbar-user">
        <div class="topbar-avatar" id="topbar-avatar-letter">U</div>
        <span id="topbar-username">Usuário</span>
      </div>
    </div>
  </header>
  <main class="page-content">
    <div class="page-header">
      <div><h1>Novo Ônibus</h1><p class="page-subtitle">Cadastre um veículo para o transporte escolar</p></div>
    </div>
    <div id="alert-area"></div>
    <form id="formOnibus" novalidate>
      <div class="ste-card">
        <div class="ste-card-header">
          <div class="card-icon"><i class="bi bi-bus-front"></i></div>
          <h2>Dados do Veículo</h2>
        </div>
        <div class="row g-3">
          <div class="col-md-3">
            <label for="placa" class="form-label">Placa <span class="text-danger">*</span></label>
            <input type="text" id="placa" class="form-control" placeholder="AAA-0000" required maxlength="8"
                   style="text-transform:uppercase; font-family:monospace; letter-spacing:2px;">
            <div class="invalid-feedback">Informe a placa.</div>
          </div>
          <div class="col-md-5">
            <label for="modelo" class="form-label">Modelo <span class="text-danger">*</span></label>
            <input type="text" id="modelo" class="form-control" placeholder="Ex: Marcopolo Volare W9" required>
            <div class="invalid-feedback">Informe o modelo.</div>
          </div>
          <div class="col-md-2">
            <label for="capacidade" class="form-label">Capacidade <span class="text-danger">*</span></label>
            <input type="number" id="capacidade" class="form-control" placeholder="Ex: 40" min="1" max="100" required>
            <div class="invalid-feedback">Informe a capacidade.</div>
          </div>
          <div class="col-md-2">
            <label for="ano" class="form-label">Ano <span class="text-danger">*</span></label>
            <input type="number" id="ano" class="form-control" placeholder="2024" min="1990"
                   max="2030" required>
            <div class="invalid-feedback">Informe o ano.</div>
          </div>
          <div class="col-md-3">
            <label for="situacao" class="form-label">Situação <span class="text-danger">*</span></label>
            <select id="situacao" class="form-select" required>
              <option value="">-- Selecione --</option>
              <option value="ATIVO">Ativo</option>
              <option value="INATIVO">Inativo</option>
              <option value="MANUTENÇÃO">Em Manutenção</option>
            </select>
            <div class="invalid-feedback">Selecione a situação.</div>
          </div>
        </div>
      </div>
      <div class="d-flex gap-3 justify-content-end mt-4">
        <button type="button" class="btn-ste-secondary" id="btnCancelar" style="display:none;"><i class="bi bi-x"></i> Cancelar Edição</button>
        <button type="button" class="btn-ste-secondary" id="btnLimpar" onclick="resetForm()"><i class="bi bi-eraser"></i> Limpar</button>
        <button type="submit" class="btn-ste-primary" id="btnSalvar">
          <i class="bi bi-check-lg"></i> <span id="btnSalvarText">Salvar Ônibus</span>
        </button>
      </div>
    </form>

    <!-- Listagem rápida -->
    <div class="ste-card mt-4">
      <div class="ste-card-header">
        <div class="card-icon"><i class="bi bi-list-ul"></i></div>
        <h2>Frota Cadastrada</h2>
      </div>
      <div class="table-wrapper">
        <table class="ste-table">
          <thead><tr><th>#</th><th>Placa</th><th>Modelo</th><th>Capacidade</th><th>Ano</th><th>Situação</th><th>Ações</th></tr></thead>
          <tbody id="tbodyOnibus">
            <tr><td colspan="7" class="text-center py-3 text-muted"><div class="spinner-border spinner-border-sm"></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>
<div id="toast-container"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
  import { injectSidebar } from '../assets/js/sidebar.js';
  import { showToast, badgeSituacao, confirmDelete } from '../assets/js/ui.js';
  import { api } from '../assets/js/api.js';
  if (!localStorage.getItem('ste-user')) window.location.href = 'login.html';

  let editId = null;

  document.addEventListener('DOMContentLoaded', async () => {
    injectSidebar();
    // Placa mask: auto uppercase
    const placaEl = document.getElementById('placa');
    placaEl.addEventListener('input', () => { placaEl.value = placaEl.value.toUpperCase(); });

    await loadOnibus();

    document.getElementById('formOnibus').addEventListener('submit', async e => {
      e.preventDefault();
      const form = e.target;
      form.classList.add('was-validated');
      if (!form.checkValidity()) return;
      const btn = document.getElementById('btnSalvar');
      const btnText = document.getElementById('btnSalvarText');
      btn.disabled = true; btnText.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Salvando...';
      try {
        const payload = {
          placa:      document.getElementById('placa').value.trim(),
          modelo:     document.getElementById('modelo').value.trim(),
          capacidade: parseInt(document.getElementById('capacidade').value),
          ano:        parseInt(document.getElementById('ano').value),
          situacao:   document.getElementById('situacao').value,
        };

        if (editId) {
            await api.put(`/onibus/${editId}`, payload);
            showToast('Ônibus atualizado com sucesso!', 'success');
        } else {
            await api.post('/onibus', payload);
            showToast('Ônibus cadastrado com sucesso!', 'success');
        }

        resetForm();
        await loadOnibus();
      } catch(e) {
        document.getElementById('alert-area').innerHTML =
          `<div class="alert alert-danger alert-dismissible d-flex gap-2 align-items-center mb-3 fade show">
            <i class="bi bi-exclamation-triangle-fill"></i><span>${e.message}</span>
            <button class="btn-close" data-bs-dismiss="alert"></button></div>`;
      } finally {
        btn.disabled = false; btnText.innerHTML = editId ? 'Salvar Alterações' : 'Salvar Ônibus';
      }
    });

    document.getElementById('btnCancelar').addEventListener('click', resetForm);
  });

  window.resetForm = () => {
      document.getElementById('formOnibus').reset();
      document.getElementById('formOnibus').classList.remove('was-validated');
      editId = null;
      document.querySelector('.page-header h1').innerText = 'Novo Ônibus';
      document.querySelector('.page-header .page-subtitle').innerText = 'Cadastre um veículo para o transporte escolar';
      document.getElementById('btnSalvarText').innerText = 'Salvar Ônibus';
      document.getElementById('btnCancelar').style.display = 'none';
      document.getElementById('btnLimpar').style.display = 'inline-flex';
      window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  async function loadOnibus() {
    try {
      const list = await api.get('/onibus');
      const tbody = document.getElementById('tbodyOnibus');
      if (!list.length) { tbody.innerHTML = `<tr><td colspan="7" class="text-center py-3 text-muted">Nenhum ônibus cadastrado.</td></tr>`; return; }
      tbody.innerHTML = list.map(o => `
        <tr>
          <td class="fw-600 text-accent">${o.codigo}</td>
          <td style="font-family:monospace; font-weight:700; letter-spacing:1px">${o.placa}</td>
          <td>${o.modelo}</td>
          <td><span class="fw-600">${o.capacidade}</span> <small class="text-muted">lugares</small></td>
          <td>${o.ano}</td>
          <td>${badgeSituacao(o.situacao)}</td>
          <td>
            <div class="action-btns">
              <button class="btn-icon edit" onclick="editOnibus(${o.codigo}, '${o.placa}', '${o.modelo.replace(/'/g,"\\'")}', ${o.capacidade}, ${o.ano}, '${o.situacao}')"><i class="bi bi-pencil-fill"></i></button>
              <button class="btn-icon delete" onclick="deleteOnibus(${o.codigo},'${o.placa}')"><i class="bi bi-trash-fill"></i></button>
            </div>
          </td>
        </tr>`).join('');
    } catch(e) { showToast('Erro ao listar ônibus.', 'error'); }
  }

  window.editOnibus = (id, placa, modelo, capacidade, ano, situacao) => {
      editId = id;
      document.getElementById('placa').value = placa;
      document.getElementById('modelo').value = modelo;
      document.getElementById('capacidade').value = capacidade;
      document.getElementById('ano').value = ano;
      document.getElementById('situacao').value = (situacao || '').toUpperCase();
      
      document.querySelector('.page-header h1').innerText = 'Editar Ônibus';
      document.querySelector('.page-header .page-subtitle').innerText = `Editando: Placa ${placa}`;
      document.getElementById('btnSalvarText').innerText = 'Salvar Alterações';
      document.getElementById('btnCancelar').style.display = 'inline-flex';
      document.getElementById('btnLimpar').style.display = 'none';
      window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  window.deleteOnibus = (id, placa) => {
    confirmDelete(`Excluir o ônibus de placa "${placa}"?`, async () => {
      try {
        await api.delete(`/onibus/${id}`);
        showToast('Ônibus excluído!', 'success');
        if (editId === id) resetForm();
        await loadOnibus();
      } catch(e) { showToast('Erro: ' + e.message, 'error'); }
    });
  };
</script>
</body>
</html>
