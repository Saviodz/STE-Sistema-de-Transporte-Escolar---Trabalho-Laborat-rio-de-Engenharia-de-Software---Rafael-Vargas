<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Listagem de Viagens – STE</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../styles/main.css">
</head>
<body>
<div id="sidebar"></div>
<div class="sidebar-overlay" id="sidebar-overlay"></div>
<div id="main-content">
  <header class="topbar">
    <div class="d-flex align-items-center gap-3">
      <button id="sidebar-toggle" class="btn-icon" style="background:transparent;color:var(--ste-text);">
        <i class="bi bi-list" style="font-size:22px"></i>
      </button>
      <span class="topbar-title">Viagens</span>
    </div>
    <div class="topbar-right">
      <div class="topbar-user">
        <div class="topbar-avatar" id="topbar-avatar-letter">U</div>
        <span id="topbar-username">Usuário</span>
      </div>
    </div>
  </header>
  <main class="page-content">
    <div class="page-header">
      <div><h1>Viagens Registradas</h1><p class="page-subtitle">Histórico completo de viagens do sistema</p></div>
      <a href="registro-viagem.html" class="btn-ste-primary"><i class="bi bi-plus-lg"></i> Nova Viagem</a>
    </div>

    <div class="ste-card">
      <div class="d-flex align-items-center justify-content-between mb-3 flex-wrap gap-2">
        <div class="d-flex gap-2 flex-wrap">
          <div class="search-bar">
            <i class="bi bi-search search-icon"></i>
            <input type="text" id="searchInput" class="form-control" placeholder="Buscar por rota, motorista…">
          </div>
          <input type="date" id="filterDate" class="form-control" style="width:160px" title="Filtrar por data">
        </div>
        <span class="fs-13 text-muted" id="countLabel">Carregando…</span>
      </div>
      <div class="table-wrapper">
        <table class="ste-table">
          <thead>
            <tr>
              <th>#</th><th>Data</th><th>Rota</th><th>Motorista</th>
              <th>Ônibus</th><th>Saída</th><th>Chegada</th><th>Ações</th>
            </tr>
          </thead>
          <tbody id="tbodyViagens">
            <tr><td colspan="8" class="text-center py-4 text-muted"><div class="spinner-border spinner-border-sm me-2"></div>Carregando…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- Edit Modal -->
<div class="modal fade" id="editModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header border-0">
        <h5 class="modal-title fw-600"><i class="bi bi-pencil-square me-2 text-accent"></i>Editar Viagem</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body pt-0">
        <form id="formEdit" novalidate>
          <input type="hidden" id="editCodigo">
          <div class="row g-3">
            <div class="col-md-4"><label class="form-label">Data <span class="text-danger">*</span></label>
              <input type="date" id="editData" class="form-control" required></div>
            <div class="col-md-4"><label class="form-label">Saída <span class="text-danger">*</span></label>
              <input type="time" id="editSaida" class="form-control" required></div>
            <div class="col-md-4"><label class="form-label">Chegada <span class="text-danger">*</span></label>
              <input type="time" id="editChegada" class="form-control" required></div>
            <div class="col-12"><label class="form-label">Rota <span class="text-danger">*</span></label>
              <select id="editRota" class="form-select" required><option value="">-- Carregando --</option></select></div>
            <div class="col-md-6"><label class="form-label">Motorista <span class="text-danger">*</span></label>
              <select id="editMotorista" class="form-select" required><option value="">-- Carregando --</option></select></div>
            <div class="col-md-6"><label class="form-label">Ônibus <span class="text-danger">*</span></label>
              <select id="editOnibus" class="form-select" required><option value="">-- Carregando --</option></select></div>
          </div>
        </form>
      </div>
      <div class="modal-footer border-0 pt-0">
        <button class="btn-ste-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button class="btn-ste-primary" id="btnSalvarEdit"><i class="bi bi-check-lg"></i> Salvar</button>
      </div>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
  import { injectSidebar } from '../assets/js/sidebar.js';
  import { showToast, populateSelect, confirmDelete, fmtDate } from '../assets/js/ui.js';
  import { api } from '../assets/js/api.js';
  if (!localStorage.getItem('ste-user')) window.location.href = 'login.html';

  let allData = [];
  const editModal = new bootstrap.Modal(document.getElementById('editModal'));

  document.addEventListener('DOMContentLoaded', async () => {
    injectSidebar();
    await loadAll();

    document.getElementById('searchInput').addEventListener('input', applyFilter);
    document.getElementById('filterDate').addEventListener('change', applyFilter);
    document.getElementById('btnSalvarEdit').addEventListener('click', saveEdit);
  });

  function applyFilter() {
    const q    = document.getElementById('searchInput').value.toLowerCase();
    const date = document.getElementById('filterDate').value;
    renderTable(allData.filter(v => {
      const rotaStr = `${v.rota?.origem?.nome ?? ''} ${v.rota?.destino?.nome ?? ''}`.toLowerCase();
      const motStr  = v.motorista?.nome?.toLowerCase() ?? '';
      const matchQ  = !q || rotaStr.includes(q) || motStr.includes(q);
      const matchD  = !date || v.data === date;
      return matchQ && matchD;
    }));
  }

  async function loadAll() {
    try {
      const [viagens, rotas, motoristas, onibus] = await Promise.all([
        api.get('/viagens?include=true'),
        api.get('/rotas?include=true'),
        api.get('/motoristas'),
        api.get('/onibus'),
      ]);
      allData = viagens;
      renderTable(allData);
      populateSelect('editRota', rotas, 'codigo',
        r => `${r.origem?.nome ?? r.origemId} → ${r.destino?.nome ?? r.destinoId} (${r.turno})`);
      populateSelect('editMotorista', motoristas, 'codigo', m => `${m.nome} – ${m.cnh}`);
      populateSelect('editOnibus', onibus, 'codigo', o => `${o.placa} – ${o.modelo}`);
    } catch(e) { showToast('Erro ao carregar viagens: ' + e.message, 'error'); }
  }

  function renderTable(list) {
    document.getElementById('countLabel').textContent = `${list.length} registro(s)`;
    const tbody = document.getElementById('tbodyViagens');
    if (!list.length) {
      tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state"><i class="bi bi-calendar2-x"></i><p>Nenhuma viagem encontrada.</p></div></td></tr>`;
      return;
    }
    tbody.innerHTML = list.map(v => `
      <tr>
        <td class="fw-600 text-accent">${v.codigo}</td>
        <td class="fw-600">${fmtDate(v.data)}</td>
        <td>
          <span class="fw-600">${v.rota?.origem?.nome ?? '?'}</span>
          <i class="bi bi-arrow-right mx-1 text-accent"></i>
          <span class="fw-600">${v.rota?.destino?.nome ?? '?'}</span>
        </td>
        <td>${v.motorista?.nome ?? '—'}</td>
        <td style="font-family:monospace">${v.onibus?.placa ?? '—'}</td>
        <td><span class="badge-ste embarque"><i class="bi bi-clock"></i>${v.horarioSaida}</span></td>
        <td><span class="badge-ste desembarque"><i class="bi bi-clock"></i>${v.horarioChegada}</span></td>
        <td>
          <div class="action-btns">
            <button class="btn-icon edit" onclick="openEdit(${v.codigo})"><i class="bi bi-pencil-fill"></i></button>
            <button class="btn-icon delete" onclick="deleteViagem(${v.codigo})"><i class="bi bi-trash-fill"></i></button>
          </div>
        </td>
      </tr>`).join('');
  }

  window.openEdit = async id => {
    const v = await api.get(`/viagens/${id}`);
    document.getElementById('editCodigo').value  = v.codigo;
    document.getElementById('editData').value    = v.data;
    document.getElementById('editSaida').value   = v.horarioSaida;
    document.getElementById('editChegada').value = v.horarioChegada;
    document.getElementById('editRota').value     = v.rotaId;
    document.getElementById('editMotorista').value= v.motoristaId;
    document.getElementById('editOnibus').value   = v.onibusId;
    editModal.show();
  };

  async function saveEdit() {
    const form = document.getElementById('formEdit');
    form.classList.add('was-validated');
    if (!form.checkValidity()) return;
    const id  = document.getElementById('editCodigo').value;
    const btn = document.getElementById('btnSalvarEdit');
    btn.disabled = true;
    try {
      await api.put(`/viagens/${id}`, {
        data:           document.getElementById('editData').value,
        horarioSaida:   document.getElementById('editSaida').value,
        horarioChegada: document.getElementById('editChegada').value,
        rotaId:         parseInt(document.getElementById('editRota').value),
        motoristaId:    parseInt(document.getElementById('editMotorista').value),
        onibusId:       parseInt(document.getElementById('editOnibus').value),
      });
      showToast('Viagem atualizada!', 'success');
      editModal.hide();
      await loadAll();
    } catch(e) { showToast('Erro: ' + e.message, 'error'); }
    finally { btn.disabled = false; }
  }

  window.deleteViagem = id => {
    confirmDelete(`Excluir a viagem #${id}?`, async () => {
      try {
        await api.delete(`/viagens/${id}`);
        showToast('Viagem excluída!', 'success');
        allData = allData.filter(v => v.codigo !== id);
        renderTable(allData);
      } catch(e) { showToast('Erro: ' + e.message, 'error'); }
    });
  };
</script>
</body>
</html>
