<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STE – Sistema de Transporte Escolar</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../styles/main.css">
</head>
<body>
  <div class="login-bg">
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo"><i class="bi bi-bus-front-fill"></i></div>
        <h1>STE</h1>
        <p>Sistema de Transporte Escolar</p>
      </div>
      <div class="login-body">
        <form id="loginForm" novalidate>
          <div class="mb-3">
            <label for="username" class="form-label">Usuário</label>
            <div class="input-group">
              <span class="input-group-text bg-white border-end-0"><i class="bi bi-person text-muted"></i></span>
              <input type="text" id="username" class="form-control border-start-0 ps-0"
                     placeholder="Digite seu usuário" required autocomplete="username">
              <div class="invalid-feedback">Informe o usuário.</div>
            </div>
          </div>
          <div class="mb-4">
            <label for="password" class="form-label">Senha</label>
            <div class="input-group">
              <span class="input-group-text bg-white border-end-0"><i class="bi bi-lock text-muted"></i></span>
              <input type="password" id="password" class="form-control border-start-0 ps-0"
                     placeholder="Digite sua senha" required autocomplete="current-password">
              <button type="button" class="input-group-text bg-white" id="togglePwd"
                      title="Mostrar/ocultar senha">
                <i class="bi bi-eye" id="eyeIcon"></i>
              </button>
              <div class="invalid-feedback">Informe a senha.</div>
            </div>
          </div>
          <button type="submit" class="btn-ste-primary w-100 justify-content-center py-2">
            <i class="bi bi-box-arrow-in-right"></i> Entrar no Sistema
          </button>
        </form>
        <p class="text-center mt-4 mb-0" style="font-size:11.5px; color: var(--ste-text-muted);">
          Laboratório de Engenharia de Software &bull; Rafael Vargas
        </p>
      </div>
    </div>
  </div>
  <div id="toast-container"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Toggle password visibility
    document.getElementById('togglePwd').addEventListener('click', () => {
      const pwd = document.getElementById('password');
      const icon = document.getElementById('eyeIcon');
      if (pwd.type === 'password') {
        pwd.type = 'text';
        icon.className = 'bi bi-eye-slash';
      } else {
        pwd.type = 'password';
        icon.className = 'bi bi-eye';
      }
    });

    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const form = e.target;
      form.classList.add('was-validated');
      if (!form.checkValidity()) return;
      // Simulated login (no real auth in back-end)
      localStorage.setItem('ste-user', document.getElementById('username').value);
      window.location.href = 'index.html';
    });

    // Redirect if already logged in
    if (localStorage.getItem('ste-user')) {
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
