<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Estado – STE</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../styles/main.css">
</head>
<body>
<div id="sidebar"></div>
<div class="sidebar-overlay" id="sidebar-overlay"></div>
<div id="main-content">
  <header class="topbar">
    <div class="d-flex align-items-center gap-3">
      <button id="sidebar-toggle" class="btn-icon" style="background:transparent;color:var(--ste-text);">
        <i class="bi bi-list" style="font-size:22px"></i>
      </button>
      <span class="topbar-title">Cadastro de Estado</span>
    </div>
    <div class="topbar-right">
      <div class="topbar-user">
        <div class="topbar-avatar" id="topbar-avatar-letter">U</div>
        <span id="topbar-username">Usuário</span>
      </div>
    </div>
  </header>
  <main class="page-content">
    <div class="page-header">
      <div><h1 id="pageTitle">Novo Estado</h1><p class="page-subtitle" id="pageSubtitle">Cadastre um estado no sistema</p></div>
    </div>
    <div id="alert-area"></div>
    <div class="ste-card" style="max-width:600px">
      <div class="ste-card-header">
        <div class="card-icon"><i class="bi bi-map-fill"></i></div>
        <h2>Dados do Estado</h2>
      </div>
      <form id="formEstado" novalidate>
        <div class="row g-3">
          <div class="col-md-8">
            <label for="nomeEstado" class="form-label">Nome do Estado <span class="text-danger">*</span></label>
            <input type="text" id="nomeEstado" class="form-control" placeholder="Ex: Espírito Santo" required minlength="2" maxlength="50">
            <div class="invalid-feedback">O nome deve ter entre 2 e 50 caracteres.</div>
          </div>
          <div class="col-md-4">
            <label for="siglaUF" class="form-label">Sigla UF <span class="text-danger">*</span></label>
            <input type="text" id="siglaUF" class="form-control" placeholder="Ex: ES" required minlength="2" maxlength="2" style="text-transform: uppercase;">
            <div class="invalid-feedback">Informe exatos 2 caracteres.</div>
          </div>
        </div>
        <div class="d-flex gap-3 justify-content-end mt-4">
          <button type="button" class="btn-ste-secondary" id="btnCancelar" style="display:none;"><i class="bi bi-x"></i> Cancelar Edição</button>
          <button type="button" class="btn-ste-secondary" id="btnLimpar" onclick="resetForm()"><i class="bi bi-eraser"></i> Limpar</button>
          <button type="submit" class="btn-ste-primary" id="btnSalvar">
            <i class="bi bi-check-lg"></i> <span id="btnSalvarText">Salvar Estado</span>
          </button>
        </div>
      </form>
    </div>

    <!-- Listagem rápida -->
    <div class="ste-card mt-4">
      <div class="ste-card-header">
        <div class="card-icon"><i class="bi bi-list-ul"></i></div>
        <h2>Estados Cadastrados</h2>
      </div>
      <div class="table-wrapper">
        <table class="ste-table">
          <thead><tr><th>#</th><th>Nome</th><th>Sigla UF</th><th class="text-center">Qtd Cidades</th><th>Ações</th></tr></thead>
          <tbody id="tbodyEstados">
            <tr><td colspan="5" class="text-center py-3 text-muted"><div class="spinner-border spinner-border-sm"></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>
<div id="toast-container"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
  import { injectSidebar } from '../assets/js/sidebar.js';
  import { showToast, confirmDelete } from '../assets/js/ui.js';
  import { api } from '../assets/js/api.js';
  if (!localStorage.getItem('ste-user')) window.location.href = 'login.html';

  let editId = null;

  document.addEventListener('DOMContentLoaded', async () => {
    injectSidebar();
    await loadEstados();

    document.getElementById('formEstado').addEventListener('submit', async e => {
      e.preventDefault();
      const form = e.target;
      form.classList.add('was-validated');
      if (!form.checkValidity()) return;
      const btn = document.getElementById('btnSalvar');
      const btnText = document.getElementById('btnSalvarText');
      btn.disabled = true; btnText.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Salvando...';
      try {
        const payload = {
          nome: document.getElementById('nomeEstado').value.trim(),
          siglaUF: document.getElementById('siglaUF').value.trim().toUpperCase()
        };

        if (editId) {
            await api.put(`/estados/${editId}`, payload);
            showToast('Estado atualizado com sucesso!', 'success');
        } else {
            await api.post('/estados', payload);
            showToast('Estado cadastrado com sucesso!', 'success');
        }
        
        resetForm();
        await loadEstados();
      } catch(e) {
        document.getElementById('alert-area').innerHTML =
          `<div class="alert alert-danger alert-dismissible d-flex gap-2 align-items-center mb-3 fade show">
            <i class="bi bi-exclamation-triangle-fill"></i><span>${e.message}</span>
            <button class="btn-close" data-bs-dismiss="alert"></button></div>`;
      } finally {
        btn.disabled = false; btnText.innerHTML = editId ? 'Salvar Alterações' : 'Salvar Estado';
      }
    });

    document.getElementById('btnCancelar').addEventListener('click', resetForm);
  });

  window.resetForm = () => {
      document.getElementById('formEstado').reset();
      document.getElementById('formEstado').classList.remove('was-validated');
      editId = null;
      document.getElementById('pageTitle').innerText = 'Novo Estado';
      document.getElementById('pageSubtitle').innerText = 'Cadastre um estado no sistema';
      document.getElementById('btnSalvarText').innerText = 'Salvar Estado';
      document.getElementById('btnCancelar').style.display = 'none';
      document.getElementById('btnLimpar').style.display = 'inline-flex';
      window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  async function loadEstados() {
    try {
      const estados = await api.get('/estados');
      const tbody = document.getElementById('tbodyEstados');
      if (!estados.length) { tbody.innerHTML = `<tr><td colspan="5" class="text-center py-3 text-muted">Nenhum estado cadastrado.</td></tr>`; return; }
      tbody.innerHTML = estados.map(e => `
        <tr>
          <td class="fw-600 text-accent">${e.codigo}</td>
          <td class="fw-600">${e.nome}</td>
          <td><span class="badge bg-secondary">${e.siglaUF}</span></td>
          <td class="text-center"><span class="badge bg-primary rounded-pill">${e.cidades ? e.cidades.length : 0}</span></td>
          <td>
            <div class="action-btns">
              <button class="btn-icon edit" onclick="editEstado(${e.codigo}, '${e.nome.replace(/'/g,"\\'")}', '${e.siglaUF}')"><i class="bi bi-pencil-fill"></i></button>
              <button class="btn-icon delete" onclick="deleteEstado(${e.codigo},'${e.nome.replace(/'/g,"\\'")}')"><i class="bi bi-trash-fill"></i></button>
            </div>
          </td>
        </tr>`).join('');
    } catch(e) { showToast('Erro ao listar estados.', 'error'); }
  }

  window.editEstado = (id, nome, siglaUF) => {
      editId = id;
      document.getElementById('nomeEstado').value = nome;
      document.getElementById('siglaUF').value = siglaUF;
      document.getElementById('pageTitle').innerText = 'Editar Estado';
      document.getElementById('pageSubtitle').innerText = `Editando: ${nome}`;
      document.getElementById('btnSalvarText').innerText = 'Salvar Alterações';
      document.getElementById('btnCancelar').style.display = 'inline-flex';
      document.getElementById('btnLimpar').style.display = 'none';
      window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  window.deleteEstado = (id, nome) => {
    confirmDelete(`Excluir o estado "${nome}"?`, async () => {
      try {
        await api.delete(`/estados/${id}`);
        showToast('Estado excluído!', 'success');
        if (editId === id) resetForm();
        await loadEstados();
      } catch(e) { showToast('Erro: ' + e.message, 'error'); }
    });
  };
</script>
</body>
</html>
