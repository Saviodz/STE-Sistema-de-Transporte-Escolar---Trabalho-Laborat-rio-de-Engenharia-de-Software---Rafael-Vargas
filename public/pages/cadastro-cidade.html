<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Cidade – STE</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../styles/main.css">
</head>
<body>
<div id="sidebar"></div>
<div class="sidebar-overlay" id="sidebar-overlay"></div>
<div id="main-content">
  <header class="topbar">
    <div class="d-flex align-items-center gap-3">
      <button id="sidebar-toggle" class="btn-icon" style="background:transparent;color:var(--ste-text);">
        <i class="bi bi-list" style="font-size:22px"></i>
      </button>
      <span class="topbar-title">Cadastro de Cidade</span>
    </div>
    <div class="topbar-right">
      <div class="topbar-user">
        <div class="topbar-avatar" id="topbar-avatar-letter">U</div>
        <span id="topbar-username">Usuário</span>
      </div>
    </div>
  </header>
  <main class="page-content">
    <div class="page-header">
      <div><h1>Nova Cidade</h1><p class="page-subtitle">Cadastre uma cidade no sistema</p></div>
    </div>
    <div id="alert-area"></div>
    <div class="ste-card" style="max-width:600px">
      <div class="ste-card-header">
        <div class="card-icon"><i class="bi bi-geo-alt-fill"></i></div>
        <h2>Dados da Cidade</h2>
      </div>
      <form id="formCidade" novalidate>
        <div class="row g-3">
          <div class="col-md-8">
            <label for="nomeCidade" class="form-label">Nome da Cidade <span class="text-danger">*</span></label>
            <input type="text" id="nomeCidade" class="form-control" placeholder="Ex: Cachoeiro de Itapemirim" required minlength="2" maxlength="60">
            <div class="invalid-feedback">O nome deve ter entre 2 e 60 caracteres.</div>
          </div>
          <div class="col-md-4">
            <label for="estadoId" class="form-label">Estado <span class="text-danger">*</span></label>
            <select id="estadoId" class="form-select" required>
              <option value="">-- Carregando... --</option>
            </select>
            <div class="invalid-feedback">Selecione o estado.</div>
          </div>
        </div>
        <div class="d-flex gap-3 justify-content-end mt-4">
          <a href="index.html" class="btn-ste-secondary"><i class="bi bi-x"></i> Cancelar</a>
          <button type="submit" class="btn-ste-primary" id="btnSalvar">
            <i class="bi bi-check-lg"></i> Salvar Cidade
          </button>
        </div>
      </form>
    </div>

    <!-- Listagem rápida -->
    <div class="ste-card mt-4">
      <div class="ste-card-header">
        <div class="card-icon"><i class="bi bi-list-ul"></i></div>
        <h2>Cidades Cadastradas</h2>
      </div>
      <div class="table-wrapper">
        <table class="ste-table">
          <thead><tr><th>#</th><th>Nome</th><th>Estado</th><th>Ações</th></tr></thead>
          <tbody id="tbodyCidades">
            <tr><td colspan="4" class="text-center py-3 text-muted"><div class="spinner-border spinner-border-sm"></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>
<div id="toast-container"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
  import { injectSidebar } from '../assets/js/sidebar.js';
  import { showToast, populateSelect, confirmDelete } from '../assets/js/ui.js';
  import { api } from '../assets/js/api.js';
  if (!localStorage.getItem('ste-user')) window.location.href = 'login.html';

  document.addEventListener('DOMContentLoaded', async () => {
    injectSidebar();
    try {
      const estados = await api.get('/estados');
      populateSelect('estadoId', estados, 'codigo', e => `${e.nome} (${e.sigla})`, 'Selecione o estado');
    } catch(e) { showToast('Erro ao carregar estados.', 'error'); }
    await loadCidades();

    document.getElementById('formCidade').addEventListener('submit', async e => {
      e.preventDefault();
      const form = e.target;
      form.classList.add('was-validated');
      if (!form.checkValidity()) return;
      const btn = document.getElementById('btnSalvar');
      btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Salvando...';
      try {
        await api.post('/cidades', {
          nome: document.getElementById('nomeCidade').value.trim(),
          estadoId: parseInt(document.getElementById('estadoId').value),
        });
        showToast('Cidade cadastrada com sucesso!', 'success');
        form.reset(); form.classList.remove('was-validated');
        await loadCidades();
      } catch(e) {
        document.getElementById('alert-area').innerHTML =
          `<div class="alert alert-danger alert-dismissible d-flex gap-2 align-items-center mb-3 fade show">
            <i class="bi bi-exclamation-triangle-fill"></i><span>${e.message}</span>
            <button class="btn-close" data-bs-dismiss="alert"></button></div>`;
      } finally {
        btn.disabled = false; btn.innerHTML = '<i class="bi bi-check-lg"></i> Salvar Cidade';
      }
    });
  });

  async function loadCidades() {
    try {
      const cidades = await api.get('/cidades?include=true');
      const tbody = document.getElementById('tbodyCidades');
      if (!cidades.length) { tbody.innerHTML = `<tr><td colspan="4" class="text-center py-3 text-muted">Nenhuma cidade cadastrada.</td></tr>`; return; }
      tbody.innerHTML = cidades.map(c => `
        <tr>
          <td class="fw-600 text-accent">${c.codigo}</td>
          <td class="fw-600">${c.nome}</td>
          <td>${c.estado?.nome ?? ''} <span class="badge bg-secondary ms-1">${c.estado?.sigla ?? ''}</span></td>
          <td>
            <div class="action-btns">
              <button class="btn-icon delete" onclick="deleteCidade(${c.codigo},'${c.nome.replace(/'/g,"\\'")}')"><i class="bi bi-trash-fill"></i></button>
            </div>
          </td>
        </tr>`).join('');
    } catch(e) { showToast('Erro ao listar cidades.', 'error'); }
  }

  window.deleteCidade = (id, nome) => {
    confirmDelete(`Excluir a cidade "${nome}"?`, async () => {
      try {
        await api.delete(`/cidades/${id}`);
        showToast('Cidade excluída!', 'success');
        await loadCidades();
      } catch(e) { showToast('Erro: ' + e.message, 'error'); }
    });
  };
</script>
</body>
</html>
