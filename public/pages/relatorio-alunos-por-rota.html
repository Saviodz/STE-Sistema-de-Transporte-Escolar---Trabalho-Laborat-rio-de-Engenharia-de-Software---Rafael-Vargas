<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Relatório de Alunos por Rota – STE</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../styles/main.css">
</head>
<body>
<div id="sidebar"></div>
<div class="sidebar-overlay" id="sidebar-overlay"></div>
<div id="main-content">
  <header class="topbar">
    <div class="d-flex align-items-center gap-3">
      <button id="sidebar-toggle" class="btn-icon" style="background:transparent;color:var(--ste-text);">
        <i class="bi bi-list" style="font-size:22px"></i>
      </button>
      <span class="topbar-title">Relatório de Alunos por Rota</span>
    </div>
    <div class="topbar-right">
      <div class="topbar-user">
        <div class="topbar-avatar" id="topbar-avatar-letter">U</div>
        <span id="topbar-username">Usuário</span>
      </div>
    </div>
  </header>
  <main class="page-content">
    <div class="page-header">
      <div><h1>Alunos por Rota</h1><p class="page-subtitle">Consulte os alunos vinculados a uma rota específica</p></div>
    </div>
    
    <div class="ste-card mb-4" style="max-width:600px">
      <div class="ste-card-header">
        <div class="card-icon"><i class="bi bi-funnel-fill"></i></div>
        <h2>Filtro</h2>
      </div>
      <form id="formFiltro" class="d-flex gap-3 align-items-end">
        <div class="flex-grow-1">
          <label for="rotaId" class="form-label">Selecione a Rota <span class="text-danger">*</span></label>
          <select id="rotaId" class="form-select" required>
            <option value="">-- Carregando... --</option>
          </select>
        </div>
        <div>
          <button type="submit" class="btn-ste-primary" id="btnBuscar">
            <i class="bi bi-search"></i> Buscar
          </button>
        </div>
      </form>
    </div>

    <!-- Resultados -->
    <div class="ste-card">
      <div class="ste-card-header">
        <div class="card-icon"><i class="bi bi-table"></i></div>
        <h2>Resultados</h2>
      </div>
      <div class="table-wrapper">
        <table class="ste-table">
          <thead><tr><th>#</th><th>Nome do Aluno</th><th>CPF</th><th>Situação</th><th>Instituição</th></tr></thead>
          <tbody id="tbodyResultados">
            <tr><td colspan="5" class="text-center py-3 text-muted">Selecione uma rota e clique em Buscar.</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>
<div id="toast-container"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
  import { injectSidebar } from '../assets/js/sidebar.js';
  import { showToast, populateSelect } from '../assets/js/ui.js';
  import { api } from '../assets/js/api.js';
  if (!localStorage.getItem('ste-user')) window.location.href = 'login.html';

  document.addEventListener('DOMContentLoaded', async () => {
    injectSidebar();
    try {
      const rotas = await api.get('/rotas?include=true');
      populateSelect('rotaId', rotas, 'codigo', r => `${r.descricao} - ${r.turno} (${r.origem?.nome ?? '?'} -> ${r.destino?.nome ?? '?'})`, 'Selecione a rota');
    } catch(e) { showToast('Erro ao carregar rotas.', 'error'); }

    document.getElementById('formFiltro').addEventListener('submit', async e => {
      e.preventDefault();
      const rotaId = document.getElementById('rotaId').value;
      if (!rotaId) {
          showToast('Por favor, selecione uma rota.', 'error');
          return;
      }
      
      const btn = document.getElementById('btnBuscar');
      btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';
      
      try {
        const alunos = await api.get(`/relatorios/alunos-por-rota/${rotaId}`);
        const tbody = document.getElementById('tbodyResultados');
        if (!alunos.length) { 
            tbody.innerHTML = `<tr><td colspan="5" class="text-center py-3 text-muted">Nenhum aluno vinculado a esta rota.</td></tr>`; 
        } else {
            tbody.innerHTML = alunos.map(a => `
              <tr>
                <td class="fw-600 text-accent">${a.codigo}</td>
                <td class="fw-600">${a.nome}</td>
                <td>${a.cpf}</td>
                <td><span class="badge ${a.situacaoAcesso?.toUpperCase() === 'ATIVO' ? 'bg-success' : 'bg-warning'}">${a.situacaoAcesso || '-'}</span></td>
                <td>${a.instituicaoEnsino?.nome ?? '-'}</td>
              </tr>`).join('');
        }
      } catch(e) {
        showToast('Erro ao buscar dados: ' + e.message, 'error');
      } finally {
        btn.disabled = false; btn.innerHTML = '<i class="bi bi-search"></i> Buscar';
      }
    });
  });
</script>
</body>
</html>
