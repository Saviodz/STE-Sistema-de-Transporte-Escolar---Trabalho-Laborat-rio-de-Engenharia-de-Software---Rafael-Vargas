<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Rota – STE</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../styles/main.css">
</head>
<body>
<div id="sidebar"></div>
<div class="sidebar-overlay" id="sidebar-overlay"></div>
<div id="main-content">
  <header class="topbar">
    <div class="d-flex align-items-center gap-3">
      <button id="sidebar-toggle" class="btn-icon" style="background:transparent;color:var(--ste-text);">
        <i class="bi bi-list" style="font-size:22px"></i>
      </button>
      <span class="topbar-title">Cadastro de Rota</span>
    </div>
    <div class="topbar-right">
      <div class="topbar-user">
        <div class="topbar-avatar" id="topbar-avatar-letter">U</div>
        <span id="topbar-username">Usuário</span>
      </div>
    </div>
  </header>
  <main class="page-content">
    <div class="page-header">
      <div><h1>Nova Rota</h1><p class="page-subtitle">Defina uma rota de transporte entre cidades</p></div>
    </div>
    <div id="alert-area"></div>
    <form id="formRota" novalidate>
      <div class="ste-card">
        <div class="ste-card-header">
          <div class="card-icon"><i class="bi bi-signpost-2-fill"></i></div>
          <h2>Dados da Rota</h2>
        </div>
        <div class="row g-3">
          <div class="col-md-4">
            <label for="origemId" class="form-label">Cidade de Origem <span class="text-danger">*</span></label>
            <select id="origemId" class="form-select" required>
              <option value="">-- Carregando... --</option>
            </select>
            <div class="invalid-feedback">Selecione a origem.</div>
          </div>
          <div class="col-md-1 d-flex align-items-end justify-content-center pb-1">
            <i class="bi bi-arrow-right fs-4 text-accent"></i>
          </div>
          <div class="col-md-4">
            <label for="destinoId" class="form-label">Cidade de Destino <span class="text-danger">*</span></label>
            <select id="destinoId" class="form-select" required>
              <option value="">-- Carregando... --</option>
            </select>
            <div class="invalid-feedback">Selecione o destino.</div>
          </div>
          <div class="col-md-3">
            <label for="turno" class="form-label">Turno <span class="text-danger">*</span></label>
            <select id="turno" class="form-select" required>
              <option value="">-- Selecione --</option>
              <option value="MATUTINO">Matutino</option>
              <option value="VESPERTINO">Vespertino</option>
              <option value="NOTURNO">Noturno</option>
            </select>
            <div class="invalid-feedback">Selecione o turno.</div>
          </div>
          <div class="col-md-8">
            <label for="descricao" class="form-label">Descrição <span class="text-danger">*</span></label>
            <input type="text" id="descricao" class="form-control"
                   placeholder="Descreva o percurso, pontos de parada, etc." required>
            <div class="invalid-feedback">Informe a descrição.</div>
          </div>
          <div class="col-md-4">
            <label for="observacao" class="form-label">Observação</label>
            <input type="text" id="observacao" class="form-control" placeholder="Opcional">
          </div>
        </div>
      </div>
      <div class="d-flex gap-3 justify-content-end mt-4">
        <button type="button" class="btn-ste-secondary" id="btnCancelar" style="display:none;"><i class="bi bi-x"></i> Cancelar Edição</button>
        <button type="button" class="btn-ste-secondary" id="btnLimpar" onclick="resetForm()"><i class="bi bi-eraser"></i> Limpar</button>
        <button type="submit" class="btn-ste-primary" id="btnSalvar">
          <i class="bi bi-check-lg"></i> <span id="btnSalvarText">Salvar Rota</span>
        </button>
      </div>
    </form>

    <!-- Listagem rápida -->
    <div class="ste-card mt-4">
      <div class="ste-card-header">
        <div class="card-icon"><i class="bi bi-list-ul"></i></div>
        <h2>Rotas Cadastradas</h2>
      </div>
      <div class="table-wrapper">
        <table class="ste-table">
          <thead><tr><th>#</th><th>Origem → Destino</th><th>Turno</th><th>Descrição</th><th>Observação</th><th class="text-center">Qtd Alunos</th><th>Ações</th></tr></thead>
          <tbody id="tbodyRotas">
            <tr><td colspan="7" class="text-center py-3 text-muted"><div class="spinner-border spinner-border-sm"></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>
<div id="toast-container"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
  import { injectSidebar } from '../assets/js/sidebar.js';
  import { showToast, populateSelect, confirmDelete } from '../assets/js/ui.js';
  import { api } from '../assets/js/api.js';
  if (!localStorage.getItem('ste-user')) window.location.href = 'login.html';

  let editId = null;

  document.addEventListener('DOMContentLoaded', async () => {
    injectSidebar();
    try {
      const cidades = await api.get('/cidades?include=true');
      const lblFn = c => `${c.nome} – ${c.estado?.siglaUF ?? ''}`;
      populateSelect('origemId',  cidades, 'codigo', lblFn, 'Selecione a origem');
      populateSelect('destinoId', cidades, 'codigo', lblFn, 'Selecione o destino');
    } catch(e) { showToast('Erro ao carregar cidades.', 'error'); }
    await loadRotas();

    document.getElementById('formRota').addEventListener('submit', async e => {
      e.preventDefault();
      const form = e.target;
      form.classList.add('was-validated');
      if (!form.checkValidity()) return;
      const btn = document.getElementById('btnSalvar');
      const btnText = document.getElementById('btnSalvarText');
      btn.disabled = true; btnText.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Salvando...';
      try {
        const payload = {
          origemId:   parseInt(document.getElementById('origemId').value),
          destinoId:  parseInt(document.getElementById('destinoId').value),
          turno:      document.getElementById('turno').value,
          descricao:  document.getElementById('descricao').value.trim(),
          observacao: document.getElementById('observacao').value.trim() || null,
        };

        if (editId) {
            await api.put(`/rotas/${editId}`, payload);
            showToast('Rota atualizada com sucesso!', 'success');
        } else {
            await api.post('/rotas', payload);
            showToast('Rota cadastrada com sucesso!', 'success');
        }

        resetForm();
        await loadRotas();
      } catch(e) {
        document.getElementById('alert-area').innerHTML =
          `<div class="alert alert-danger alert-dismissible d-flex gap-2 align-items-center mb-3 fade show">
            <i class="bi bi-exclamation-triangle-fill"></i><span>${e.message}</span>
            <button class="btn-close" data-bs-dismiss="alert"></button></div>`;
      } finally {
        btn.disabled = false; btnText.innerHTML = editId ? 'Salvar Alterações' : 'Salvar Rota';
      }
    });

    document.getElementById('btnCancelar').addEventListener('click', resetForm);
  });

  window.resetForm = () => {
      document.getElementById('formRota').reset();
      document.getElementById('formRota').classList.remove('was-validated');
      editId = null;
      document.querySelector('.page-header h1').innerText = 'Nova Rota';
      document.querySelector('.page-header .page-subtitle').innerText = 'Defina uma rota de transporte entre cidades';
      document.getElementById('btnSalvarText').innerText = 'Salvar Rota';
      document.getElementById('btnCancelar').style.display = 'none';
      document.getElementById('btnLimpar').style.display = 'inline-flex';
      window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  async function loadRotas() {
    try {
      const list = await api.get('/rotas?include=true');
      const tbody = document.getElementById('tbodyRotas');
      if (!list.length) { tbody.innerHTML = `<tr><td colspan="7" class="text-center py-3 text-muted">Nenhuma rota cadastrada.</td></tr>`; return; }
      const turnoBadge = t => {
        const map = { 'MATUTINO': 'bg-warning text-dark', 'VESPERTINO': 'bg-info', 'NOTURNO': 'bg-dark text-white' };
        return `<span class="badge ${map[t] || 'bg-secondary text-white'}">${t}</span>`;
      };
      tbody.innerHTML = list.map(r => `
        <tr>
          <td class="fw-600 text-accent">${r.codigo}</td>
          <td>
            <span class="fw-600">${r.origem?.nome ?? r.origemId}</span>
            <i class="bi bi-arrow-right mx-1 text-accent"></i>
            <span class="fw-600">${r.destino?.nome ?? r.destinoId}</span>
          </td>
          <td>${turnoBadge(r.turno)}</td>
          <td style="max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap" title="${r.descricao}">${r.descricao}</td>
          <td>${r.observacao ?? '—'}</td>
          <td class="text-center"><span class="badge bg-primary rounded-pill">${r.matriculas ? r.matriculas.length : 0}</span></td>
          <td>
            <div class="action-btns">
              <button class="btn-icon edit" onclick="editRota(${r.codigo}, ${r.origemId}, ${r.destinoId}, '${r.turno}', '${r.descricao.replace(/'/g,"\\'")}', '${(r.observacao||'').replace(/'/g,"\\'")}')"><i class="bi bi-pencil-fill"></i></button>
              <button class="btn-icon delete" onclick="deleteRota(${r.codigo},'${(r.origem?.nome ?? r.origemId)+' → '+(r.destino?.nome ?? r.destinoId)}')"><i class="bi bi-trash-fill"></i></button>
            </div>
          </td>
        </tr>`).join('');
    } catch(e) { showToast('Erro ao listar rotas.', 'error'); }
  }

  window.editRota = (id, origemId, destinoId, turno, descricao, observacao) => {
      editId = id;
      document.getElementById('origemId').value = origemId;
      document.getElementById('destinoId').value = destinoId;
      document.getElementById('turno').value = turno;
      document.getElementById('descricao').value = descricao;
      document.getElementById('observacao').value = observacao;
      
      document.querySelector('.page-header h1').innerText = 'Editar Rota';
      document.querySelector('.page-header .page-subtitle').innerText = `Editando rota #${id}`;
      document.getElementById('btnSalvarText').innerText = 'Salvar Alterações';
      document.getElementById('btnCancelar').style.display = 'inline-flex';
      document.getElementById('btnLimpar').style.display = 'none';
      window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  window.deleteRota = (id, label) => {
    confirmDelete(`Excluir a rota "${label}"?`, async () => {
      try {
        await api.delete(`/rotas/${id}`);
        showToast('Rota excluída!', 'success');
        if (editId === id) resetForm();
        await loadRotas();
      } catch(e) { showToast('Erro: ' + e.message, 'error'); }
    });
  };
</script>
</body>
</html>
