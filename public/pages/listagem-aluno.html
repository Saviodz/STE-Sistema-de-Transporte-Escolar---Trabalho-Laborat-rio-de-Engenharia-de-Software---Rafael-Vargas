<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Listagem de Alunos – STE</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../styles/main.css">
</head>
<body>

<div id="sidebar"></div>
<div class="sidebar-overlay" id="sidebar-overlay"></div>

<div id="main-content">
  <header class="topbar">
    <div class="d-flex align-items-center gap-3">
      <button id="sidebar-toggle" class="btn-icon" style="background:transparent;color:var(--ste-text);">
        <i class="bi bi-list" style="font-size:22px"></i>
      </button>
      <span class="topbar-title">Alunos</span>
    </div>
    <div class="topbar-right">
      <div class="topbar-user">
        <div class="topbar-avatar" id="topbar-avatar-letter">U</div>
        <span id="topbar-username">Usuário</span>
      </div>
    </div>
  </header>

  <main class="page-content">
    <div class="page-header">
      <div>
        <h1>Alunos Cadastrados</h1>
        <p class="page-subtitle">Gerencie os alunos registrados no sistema</p>
      </div>
      <a href="cadastro-aluno.html" class="btn-ste-primary">
        <i class="bi bi-plus-lg"></i> Novo Aluno
      </a>
    </div>

    <div class="ste-card">
      <!-- Toolbar -->
      <div class="d-flex align-items-center justify-content-between mb-3 flex-wrap gap-2">
        <div class="search-bar">
          <i class="bi bi-search search-icon"></i>
          <input type="text" id="searchInput" class="form-control" placeholder="Buscar por nome ou CPF…">
        </div>
        <span class="fs-13 text-muted" id="countLabel">Carregando…</span>
      </div>

      <!-- Table -->
      <div class="table-wrapper">
        <table class="ste-table" id="tabelaAlunos">
          <thead>
            <tr>
              <th>#</th>
              <th>Nome</th>
              <th>CPF</th>
              <th>Instituição</th>
              <th>Prefeitura</th>
              <th>Situação</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="tbodyAlunos">
            <tr><td colspan="7" class="text-center py-4 text-muted"><div class="spinner-border spinner-border-sm me-2"></div>Carregando…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- Edit Modal -->
<div class="modal fade" id="editModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header border-0">
        <h5 class="modal-title fw-600"><i class="bi bi-pencil-square me-2 text-accent"></i>Editar Aluno</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body pt-0">
        <form id="formEdit" novalidate>
          <input type="hidden" id="editCodigo">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Nome <span class="text-danger">*</span></label>
              <input type="text" id="editNome" class="form-control" required>
              <div class="invalid-feedback">Campo obrigatório.</div>
            </div>
            <div class="col-md-3">
              <label class="form-label">CPF <span class="text-danger">*</span></label>
              <input type="text" id="editCpf" class="form-control" required maxlength="14">
              <div class="invalid-feedback">Campo obrigatório.</div>
            </div>
            <div class="col-md-3">
              <label class="form-label">Data de Nascimento <span class="text-danger">*</span></label>
              <input type="date" id="editDataNasc" class="form-control" required>
              <div class="invalid-feedback">Campo obrigatório.</div>
            </div>
            <div class="col-md-8">
              <label class="form-label">Endereço <span class="text-danger">*</span></label>
              <input type="text" id="editEndereco" class="form-control" required>
              <div class="invalid-feedback">Campo obrigatório.</div>
            </div>
            <div class="col-md-4">
              <label class="form-label">Telefones <span class="text-danger">*</span></label>
              <input type="text" id="editTelefones" class="form-control" required>
              <div class="invalid-feedback">Campo obrigatório.</div>
            </div>
            <div class="col-md-6">
              <label class="form-label">Responsável Legal</label>
              <input type="text" id="editResponsavel" class="form-control">
            </div>
            <div class="col-md-3">
              <label class="form-label">Situação <span class="text-danger">*</span></label>
              <select id="editSituacao" class="form-select" required>
                <option value="ATIVO">Ativo</option>
                <option value="INATIVO">Inativo</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label">Prefeitura <span class="text-danger">*</span></label>
              <select id="editPrefeitura" class="form-select" required>
                <option value="">-- Carregando --</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label">Instituição de Ensino <span class="text-danger">*</span></label>
              <select id="editInstituicao" class="form-select" required>
                <option value="">-- Carregando --</option>
              </select>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer border-0 pt-0">
        <button type="button" class="btn-ste-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn-ste-primary" id="btnSalvarEdit">
          <i class="bi bi-check-lg"></i> Salvar Alterações
        </button>
      </div>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<div id="confirm-placeholder"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
  import { injectSidebar } from '../assets/js/sidebar.js';
  import { showToast, populateSelect, badgeSituacao, confirmDelete, fmtDate } from '../assets/js/ui.js';
  import { api } from '../assets/js/api.js';

  if (!localStorage.getItem('ste-user')) window.location.href = 'login.html';

  let allAlunos = [];
  const editModal = new bootstrap.Modal(document.getElementById('editModal'));

  document.addEventListener('DOMContentLoaded', async () => {
    injectSidebar();
    await loadAll();

    document.getElementById('searchInput').addEventListener('input', e => {
      const q = e.target.value.toLowerCase();
      renderTable(allAlunos.filter(a =>
        a.nome?.toLowerCase().includes(q) || a.cpf?.includes(q)
      ));
    });

    document.getElementById('btnSalvarEdit').addEventListener('click', saveEdit);
  });

  async function loadAll() {
    try {
      allAlunos = await api.get('/alunos?include=true');
      renderTable(allAlunos);
      // Pre-load selects for edit modal
      const [prefeituras, instituicoes] = await Promise.all([
        api.get('/prefeituras'), api.get('/instituicoes-ensino')
      ]);
      populateSelect('editPrefeitura',  prefeituras,  'codigo', p => p.razaoSocial);
      populateSelect('editInstituicao', instituicoes, 'codigo', i => i.nome);
    } catch (e) {
      showToast('Erro ao carregar alunos: ' + e.message, 'error');
    }
  }

  function renderTable(list) {
    const tbody = document.getElementById('tbodyAlunos');
    document.getElementById('countLabel').textContent = `${list.length} registro(s)`;

    if (!list.length) {
      tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><i class="bi bi-people"></i><p>Nenhum aluno encontrado.</p></div></td></tr>`;
      return;
    }

    tbody.innerHTML = list.map(a => `
      <tr>
        <td class="fw-600 text-accent">${a.codigo}</td>
        <td class="fw-600">${a.nome}</td>
        <td style="font-family:monospace">${a.cpf}</td>
        <td>${a.instituicaoEnsino?.nome ?? a.instituicaoEnsinoId ?? '—'}</td>
        <td>${a.prefeitura?.razaoSocial ?? a.prefeituraId ?? '—'}</td>
        <td>${badgeSituacao(a.situacaoAcesso)}</td>
        <td>
          <div class="action-btns">
            <button class="btn-icon edit" title="Editar" onclick="openEdit(${a.codigo})"><i class="bi bi-pencil-fill"></i></button>
            <button class="btn-icon delete" title="Excluir" onclick="deleteAluno(${a.codigo}, '${a.nome.replace(/'/g, "\\'")}')"><i class="bi bi-trash-fill"></i></button>
          </div>
        </td>
      </tr>`).join('');
  }

  window.openEdit = async (id) => {
    try {
      const a = await api.get(`/alunos/${id}?include=true`);
      document.getElementById('editCodigo').value    = a.codigo;
      document.getElementById('editNome').value      = a.nome;
      document.getElementById('editCpf').value       = a.cpf;
      document.getElementById('editDataNasc').value  = a.dataNascimento;
      document.getElementById('editEndereco').value  = a.endereco;
      document.getElementById('editTelefones').value = a.telefones;
      document.getElementById('editResponsavel').value = a.responsavelLegal || '';
      document.getElementById('editSituacao').value  = a.situacaoAcesso;
      document.getElementById('editPrefeitura').value  = a.prefeituraId;
      document.getElementById('editInstituicao').value = a.instituicaoEnsinoId;
      editModal.show();
    } catch (e) {
      showToast('Erro ao carregar aluno: ' + e.message, 'error');
    }
  };

  async function saveEdit() {
    const form = document.getElementById('formEdit');
    form.classList.add('was-validated');
    if (!form.checkValidity()) return;
    const id = document.getElementById('editCodigo').value;
    const btn = document.getElementById('btnSalvarEdit');
    btn.disabled = true;
    try {
      await api.put(`/alunos/${id}`, {
        nome: document.getElementById('editNome').value.trim(),
        cpf: document.getElementById('editCpf').value.trim(),
        dataNascimento: document.getElementById('editDataNasc').value,
        endereco: document.getElementById('editEndereco').value.trim(),
        telefones: document.getElementById('editTelefones').value.trim(),
        responsavelLegal: document.getElementById('editResponsavel').value.trim() || null,
        situacaoAcesso: document.getElementById('editSituacao').value,
        prefeituraId: parseInt(document.getElementById('editPrefeitura').value),
        instituicaoEnsinoId: parseInt(document.getElementById('editInstituicao').value),
      });
      showToast('Aluno atualizado com sucesso!', 'success');
      editModal.hide();
      allAlunos = [];
      await loadAll();
    } catch (e) {
      showToast('Erro ao salvar: ' + e.message, 'error');
    } finally {
      btn.disabled = false;
    }
  }

  window.deleteAluno = (id, nome) => {
    confirmDelete(`Deseja excluir o aluno "${nome}"? Esta ação não pode ser desfeita.`, async () => {
      try {
        await api.delete(`/alunos/${id}`);
        showToast('Aluno excluído com sucesso!', 'success');
        allAlunos = allAlunos.filter(a => a.codigo !== id);
        renderTable(allAlunos);
      } catch (e) {
        showToast('Erro ao excluir: ' + e.message, 'error');
      }
    });
  };
</script>
</body>
</html>
